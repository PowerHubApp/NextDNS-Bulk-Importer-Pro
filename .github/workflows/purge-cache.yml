name: Purge Cache

on:
  push:
    branches:
      - main
    paths:
      - 'scripts/nextdns-importer.user.js'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"

      - name: Extract UserScript header
        run: |
          SCRIPT_PATH="scripts/nextdns-importer.user.js"
          META_PATH="scripts/nextdns-importer.update.user.js"

          sed -n '/\/\/ ==UserScript==/,/\/\/ ==\/UserScript==/p' "$SCRIPT_PATH" > "$META_PATH"

      - name: Commit and push changes
        id: git_commit
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add "scripts/nextdns-importer.update.user.js"

          if git diff --cached --quiet; then
            echo "No changes detected in the metadata block."
            echo "should_purge=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: automatically update userscript meta block [skip ci]"
            git push
            echo "should_purge=true" >> $GITHUB_OUTPUT
          fi

      - name: Purge CDN Caches
        if: steps.git_commit.outputs.should_purge == 'true'
        uses: egad13/purge-jsdelivr-cache@v1
        with:
          url: |
            https://cdn.jsdelivr.net/gh/PowerHubApp/NextDNS-Bulk-Importer-Pro@latest/scripts/nextdns-importer.update.user.js
            https://cdn.jsdelivr.net/gh/PowerHubApp/NextDNS-Bulk-Importer-Pro@latest/scripts/nextdns-importer.user.js

